{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Events - AKU School of Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>


<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="/">
AKU - School of Management
</a>

</div>

</nav>



<section class="py-5">

<div class="container">


<h1 class="text-center mb-5">
Events Gallery
</h1>


<div class="row">


{% for event in events %}


<div class="col-md-4 mb-4">


<div class="card shadow h-100">


<img src="{{ event.image.url }}"
class="card-img-top"
height="250"
style="object-fit:cover;">


<div class="card-body">


<h5>
{{ event.title }}
</h5>


<p>
{{ event.description }}
</p>


<p>
<strong>Date:</strong> {{ event.date }}
</p>


</div>


</div>


</div>


{% empty %}


<p class="text-center">
No events available.
</p>


{% endfor %}


</div>


</div>

</section>


</body>
</html>
