{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Notices - AKU School of Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>


<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="/">
AKU - School of Management
</a>

</div>

</nav>



<section class="py-5">

<div class="container">


<h1 class="text-center mb-5">
Latest Notices
</h1>


<div class="row">


{% for notice in notices %}


<div class="col-md-6 mb-4">


<div class="card shadow">


<div class="card-body">


<h5>
{{ notice.title }}
</h5>


<p>
Date: {{ notice.date }}
</p>


<a href="{{ notice.pdf.url }}"
class="btn btn-primary"
target="_blank">

Download PDF

</a>


</div>

</div>


</div>


{% empty %}

<p class="text-center">
No notices available.
</p>


{% endfor %}


</div>


</div>

</section>


</body>
</html>
