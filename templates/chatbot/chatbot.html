<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKU AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{

    height:100vh;
    overflow:hidden;
    background:#ffffff;

}


.container{

    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;

}



.chat-box{

    width:100%;
    max-width:700px;

}



.chat-header{

    background:#0d6efd;
    color:white;
    padding:15px;
    border-radius:10px 10px 0 0;

}



.message-box{

    height:350px;
    overflow-y:auto;
    background:#f8f9fa;
    padding:20px;
    border:1px solid #ddd;

}



.user-message{

    background:#0d6efd;
    color:white;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    text-align:right;

}



.bot-message{

    background:white;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin:10px 0;

}



.bot-message a{

    color:#0d6efd;
    font-weight:bold;

}



.input-area{

    margin-top:10px;

}


</style>


</head>


<body>



<div class="container">


<div class="chat-box">



<div class="chat-header">

<h3>
🤖 AKU AI Assistant
</h3>

<p class="mb-0">
School of Management Support
</p>


</div>




<div class="message-box" id="chat-box">


<div class="bot-message">

Hello! 👋
<br>
I am AKU AI Assistant. How can I help you?

</div>


</div>




<form id="chat-form" class="input-area">


{% csrf_token %}



<div class="input-group">


<input type="text"
id="question"
class="form-control"
placeholder="Type your question...">



<button class="btn btn-primary" type="submit">

Send

</button>


</div>



</form>



</div>


</div>






<script>


document.getElementById("chat-form")
.addEventListener("submit", function(e){


e.preventDefault();



let input = document.getElementById("question");

let question = input.value.trim();



if(question==""){

return;

}



let chatBox = document.getElementById("chat-box");




// show user message

chatBox.innerHTML += `

<div class="user-message">

${question}

</div>

`;



input.value="";




// send to django

fetch("",{


method:"POST",


headers:{


"X-CSRFToken":
document.querySelector(
'[name=csrfmiddlewaretoken]'
).value


},



body:new URLSearchParams({

question:question

})


})



.then(response=>response.text())



.then(data=>{


chatBox.innerHTML += `


<div class="bot-message">

${data}

</div>


`;



chatBox.scrollTop =
chatBox.scrollHeight;



})


.catch(error=>{


console.log(error);


chatBox.innerHTML += `


<div class="bot-message">

Something went wrong.

</div>


`;



});



});



</script>



</body>

</html>
