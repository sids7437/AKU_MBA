<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKU AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    overflow:hidden;
}


.chat-box{
    max-width:700px;
    margin:auto;
}


.chat-header{
    background:#0d6efd;
    color:white;
    padding:15px;
    border-radius:10px 10px 0 0;
}


.message-box{

    height:300px;
    overflow-y:auto;
    background:#f8f9fa;
    padding:20px;
    border:1px solid #ddd;

}



.user-message{

    background:#0d6efd;
    color:white;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    text-align:right;

}



.bot-message{

    background:white;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin:10px 0;

}


.bot-message a{

    color:#0d6efd;
    text-decoration:none;
    font-weight:bold;

}


.bot-message a:hover{

    text-decoration:underline;

}


</style>


</head>


<body>


<div class="container mt-5">


<div class="chat-box">


<div class="chat-header">

<h3>
🤖 AKU AI Assistant
</h3>

<p class="mb-0">
School of Management Support
</p>

</div>



<div class="message-box">


<div class="bot-message">

Hello! 👋
<br>
I am AKU AI Assistant. How can I help you?

</div>




{% if answer %}

<div class="bot-message">

{{ answer|safe }}

</div>

{% endif %}





{% for chat in chats %}


<div class="user-message">

{{ chat.question }}

</div>



<div class="bot-message">

{{ chat.answer|safe }}

</div>



{% endfor %}



</div>





<form method="POST" class="mt-3">

{% csrf_token %}


<div class="input-group">


<input type="text"
name="question"
class="form-control"
placeholder="Type your question...">


<button class="btn btn-primary">

Send

</button>


</div>


</form>



</div>


</div>





<script>


window.onload = function(){

    var chatBox = document.querySelector(".message-box");

    if(chatBox){

        chatBox.scrollTop = chatBox.scrollHeight;

    }

}


</script>



</body>

</html>
